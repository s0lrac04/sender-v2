<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PC Sender">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Pacific Chaos — Sender</title>
<style>
:root{
  --bg:#0a0a0a;--sur:#161616;--sur2:#1e1e1e;--bor:#2a2a2a;
  --acc:#b8ff3c;--red:#ff4444;--amb:#ffb830;--txt:#efefef;--mut:#666;--mut2:#999;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;overflow:hidden;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.screen.active{transform:translateX(0);}
.screen.prev{transform:translateX(-100%);visibility:hidden;}

.hdr{padding:calc(var(--safe-top) + 12px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-back{background:none;border:none;color:var(--acc);font-size:22px;padding:4px 8px;cursor:pointer;line-height:1;font-family:'DM Mono',monospace;}
.hdr-title{font-size:13px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-logo{font-size:12px;font-weight:500;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;transition:background .3s;flex-shrink:0;}
.sync-dot.live{background:var(--acc);box-shadow:0 0 5px var(--acc);}

.filter-bar{padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--bor);display:flex;gap:6px;overflow-x:auto;flex-shrink:0;}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;font-size:10px;padding:6px 12px;border:1px solid var(--bor);background:none;color:var(--mut2);cursor:pointer;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;transition:all .12s;}
.chip.on{border-color:var(--acc);color:var(--acc);background:rgba(184,255,60,.07);}

.search-wrap{padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--bor);flex-shrink:0;}
.search-input{width:100%;background:var(--sur2);border:1px solid var(--bor);color:var(--txt);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;}
.search-input:focus{border-color:var(--acc);}

.stats-bar{padding:7px 16px;background:var(--sur);border-bottom:1px solid var(--bor);display:flex;gap:14px;font-size:10px;color:var(--mut);flex-shrink:0;overflow-x:auto;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat strong{color:var(--txt);}

.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.list::-webkit-scrollbar{display:none;}

.pitem{padding:13px 16px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:12px;cursor:pointer;}
.pitem:active{background:var(--sur);}
.pitem.done{opacity:.38;}
.pitem-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-por{background:var(--mut);}
.dot-dm{background:#4db8ff;}
.dot-ri{background:#b18cff;}
.dot-rn{background:#555;}
.dot-re{background:var(--amb);}
.dot-cl{background:var(--acc);}
.pitem-body{flex:1;min-width:0;}
.pitem-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);}
.pitem-meta{font-size:10px;color:var(--mut2);margin-top:3px;display:flex;gap:8px;}
.pitem-prio{font-size:9px;padding:2px 5px;border:1px solid;flex-shrink:0;}
.pa{border-color:var(--red);color:var(--red);}
.pm{border-color:var(--amb);color:var(--amb);}
.pn{border-color:#444;color:#555;}
.load-more{padding:18px;text-align:center;font-size:11px;color:var(--mut);cursor:pointer;border-top:1px solid var(--bor);}
.load-more:active{color:var(--acc);}
.empty{padding:40px 16px;text-align:center;color:var(--mut);font-size:12px;line-height:2.2;}
.loading{padding:40px;text-align:center;color:var(--mut);font-size:12px;line-height:2;}

.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bot) + 80px);}
.detail-scroll::-webkit-scrollbar{display:none;}
.d-section{padding:16px;border-bottom:1px solid var(--bor);}
.d-name{font-size:17px;font-weight:700;line-height:1.3;color:var(--txt);margin-bottom:5px;}
.d-cat{font-size:11px;color:var(--mut2);margin-bottom:10px;}
.d-pills{display:flex;gap:6px;flex-wrap:wrap;}
.d-pill{font-size:10px;padding:4px 10px;border:1px solid var(--bor);color:var(--mut2);text-decoration:none;}
.d-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:8px;}

.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.s-btn{padding:13px 6px;border:1.5px solid var(--bor);background:none;color:var(--mut2);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.03em;text-align:center;transition:all .12s;}
.s-btn.active-s{border-color:transparent;color:#000;font-weight:700;}
.s-por.active-s{background:var(--mut);}
.s-dm.active-s{background:#4db8ff;}
.s-ri.active-s{background:#b18cff;}
.s-rn.active-s{background:#555;color:#fff!important;}
.s-re.active-s{background:var(--amb);}
.s-cl.active-s{background:var(--acc);}

.msg-area,.note-area{width:100%;background:var(--sur2);border:1px solid var(--bor);color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;padding:12px;resize:none;outline:none;}
.msg-area{min-height:140px;}
.note-area{min-height:80px;}
.msg-area:focus,.note-area:focus{border-color:var(--acc);}

.action-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 12px calc(var(--safe-bot) + 10px);background:var(--bg);border-top:1px solid var(--bor);display:flex;gap:8px;}
.btn{flex:1;padding:15px 8px;border:none;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;text-align:center;}
.btn-wa{background:var(--acc);color:#000;}
.btn-wa:active{background:#c8ff50;}
.btn-sec{background:var(--sur2);color:var(--mut2);border:1px solid var(--bor);}
.btn-sec:active{color:var(--txt);}

.toast{position:fixed;bottom:calc(var(--safe-bot) + 90px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--acc);color:#000;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:8px 18px;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="screen active" id="screen-list">
  <div class="hdr">
    <span class="hdr-logo">⚡ Pacific Chaos</span>
    <span class="sync-dot" id="sync-dot"></span>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="srch" placeholder="Pesquisar nome, categoria..." oninput="onSearch()">

  </div>
</div>

<div class="screen" id="screen-detail">

    <button class="hdr-back" onclick="goBack()">‹</button>
    <span class="hdr-title" id="d-title">—</span>

  </div>
</div>

<div class="toast" id="toast"></div>

// Sync dot
DB.ref('.info/connected').on('value',function(s){
  var d=document.getElementById('sync-dot');
  if(s.val()){d.classList.add('live');d.title='Sincronizado';}
  else{d.classList.remove('live');d.title='A ligar...';}
});

// Load prospects from Firebase
DB.ref('pcs/prospects').once('value',function(snap){
  var data=snap.val();
  if(!data){
    document.getElementById('prospect-list').innerHTML='<div class="empty">Sem dados no Firebase.<br>Corre o ficheiro upload_prospects.html no computador primeiro.</div>';
    return;
  }
  // Firebase stores as object with numeric keys — sort by key to preserve order
  var keys=Object.keys(data).sort(function(a,b){return parseInt(a)-parseInt(b);});
  PROSPECTS=keys.map(function(k){
    var p=data[k];
    return{idx:parseInt(k),nome:p.n||'',categoria:p.c||'',rating:p.r||'',reviews:p.rv||'',
      prioridade:p.p||'',telefone:p.t||'',morada:p.m||'',instagram:p.ig||'',
      dm:p.dm||'',distancia:p.d||''};
  });
  updateStats();applyFilter();
});

// Live state sync
DB.ref('pcs/state').on('value',function(snap){
  STATE=snap.val()||{};
  if(PROSPECTS.length){updateStats();renderList();}
  if(CUR!==null) renderDetail(CUR);
});

function fbSet(k,v){var u={};u[k]=v;DB.ref('pcs/state').update(u);}

function getSt(i){return STATE[i+'_st']||'Por contactar';}
function getMsg(i){var p=PROSPECTS.find(function(x){return x.idx===i;});return STATE[i+'_msg']||(p&&DM[p.dm])||'';}
function getNote(i){return STATE[i+'_note']||'';}

function stDot(s){
  if(s==='DM enviado')return'dot-dm';
  if(s==='Respondeu - Interesse')return'dot-ri';
  if(s==='Respondeu - Sem interesse')return'dot-rn';
  if(s==='Reuniao marcada')return'dot-re';
  if(s==='Cliente')return'dot-cl';
  return'dot-por';
}

function matchF(p){
  var s=getSt(p.idx);
  if(FILTER==='all')return true;
  if(FILTER==='pend')return s==='Por contactar';
  if(FILTER==='sent')return s==='DM enviado';
  if(FILTER==='repl')return s.indexOf('Respondeu')!==-1;
  if(FILTER==='meet')return s==='Reuniao marcada';
  if(FILTER==='clie')return s==='Cliente';
  return true;
}

function applyFilter(){
  var q=SEARCH.toLowerCase();
  FILTERED=PROSPECTS.filter(function(p){
    if(!matchF(p))return false;
    if(q&&p.nome.toLowerCase().indexOf(q)===-1&&p.categoria.toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
  PAGE=0;renderList();
}

function renderList(){
  var list=document.getElementById('prospect-list');
  if(!PROSPECTS.length)return;
  var page=FILTERED.slice(0,(PAGE+1)*PAGE_SIZE);
  var more=FILTERED.length>page.length;
  list.innerHTML=page.map(function(p){
    var s=getSt(p.idx);
    var pc=p.prioridade==='ALTA'?'pa':(p.prioridade==='MEDIA'?'pm':'pn');
    var done=s!=='Por contactar'?' done':'';
    return'<div class="pitem'+done+'" onclick="openDetail('+p.idx+')">' +
      '<div class="pitem-dot '+stDot(s)+'"></div>' +
      '<div class="pitem-body"><div class="pitem-name">'+esc(p.nome)+'</div>' +
      '<div class="pitem-meta"><span>'+esc(p.categoria)+'</span><span>'+esc(p.telefone||'—')+'</span></div></div>' +
      '<span class="pitem-prio '+pc+'">'+p.prioridade.charAt(0)+'</span>' +
    '</div>';
  }).join('');
  if(more)list.innerHTML+='<div class="load-more" onclick="loadMore()">Carregar mais ('+FILTERED.length+' no total)</div>';
  if(!FILTERED.length)list.innerHTML='<div class="empty">Nenhum resultado.</div>';
}

function loadMore(){PAGE++;renderList();}

function updateStats(){
  var tot=PROSPECTS.length,pen=0,snt=0,rep=0,cli=0;
  PROSPECTS.forEach(function(p){
    var s=getSt(p.idx);
    if(s==='Por contactar')pen++;
    else if(s==='DM enviado')snt++;
    else if(s.indexOf('Respondeu')!==-1)rep++;
    else if(s==='Cliente')cli++;
    else snt++;
  });
  document.getElementById('s-tot').textContent=tot;
  document.getElementById('s-pen').textContent=pen;
  document.getElementById('s-snt').textContent=snt;
  document.getElementById('s-rep').textContent=rep;
  document.getElementById('s-cli').textContent=cli;
}

function setFilter(f,el){
  FILTER=f;
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
  applyFilter();
}
function onSearch(){SEARCH=document.getElementById('srch').value;applyFilter();}

function openDetail(idx){
  CUR=idx;renderDetail(idx);
  document.getElementById('screen-list').classList.add('prev');
  document.getElementById('screen-detail').classList.add('active');
}
function goBack(){
  document.getElementById('screen-list').classList.remove('prev');
  document.getElementById('screen-detail').classList.remove('active');
  CUR=null;
}

function renderDetail(idx){
  var p=PROSPECTS.find(function(x){return x.idx===idx;});
  if(!p)return;
  var s=getSt(idx),msg=getMsg(idx),note=getNote(idx);
  var ig=(p.instagram||'').replace('@','');
  var igu=ig?'https://instagram.com/'+ig:'';
  var maps='https://www.google.com/maps/search/'+encodeURIComponent(p.nome);
  document.getElementById('d-title').textContent=p.nome.substring(0,28)+(p.nome.length>28?'…':'');

  var sts=[
    {v:'Por contactar',k:'s-por',l:'Por contactar'},
    {v:'DM enviado',k:'s-dm',l:'DM enviado'},
    {v:'Respondeu - Interesse',k:'s-ri',l:'Com interesse'},
    {v:'Respondeu - Sem interesse',k:'s-rn',l:'Sem interesse'},
    {v:'Reuniao marcada',k:'s-re',l:'Reunião'},
    {v:'Cliente',k:'s-cl',l:'⭐ Cliente'}
  ];

  document.getElementById('detail-content').innerHTML=
    '<div class="d-section">'+
      '<div class="d-name">'+esc(p.nome)+'</div>'+
      '<div class="d-cat">'+esc(p.categoria)+' · '+esc(p.distancia)+'km · '+esc(p.prioridade)+'</div>'+
      '<div class="d-pills">'+
        (p.telefone?'<a class="d-pill" href="tel:'+p.telefone+'">📞 '+esc(p.telefone)+'</a>':'')+
        (igu?'<a class="d-pill" href="'+igu+'" target="_blank">📸 Instagram</a>':'')+
        '<a class="d-pill" href="'+maps+'" target="_blank">📍 Maps</a>'+
      '</div>'+
    '</div>'+
    '<div class="d-section">'+
      '<div class="d-label">Estado</div>'+
      '<div class="status-grid">'+
        sts.map(function(st){return'<button class="s-btn '+st.k+(s===st.v?' active-s':'')+'" onclick="setStatus('+idx+',\''+st.v+'\')">'+st.l+'</button>';}).join('')+
      '</div>'+
    '</div>'+
    '<div class="d-section">'+
      '<div class="d-label">Mensagem WhatsApp</div>'+
      '<textarea class="msg-area" id="msg-area" oninput="saveMsg('+idx+',this.value)">'+esc(msg)+'</textarea>'+
    '</div>'+
    '<div class="d-section">'+
      '<div class="d-label">Notas</div>'+
      '<textarea class="note-area" id="note-area" placeholder="Follow-ups, detalhes..." oninput="saveNote('+idx+',this.value)">'+esc(note)+'</textarea>'+
    '</div>';
}

function buildWaUrl(idx){
  var p=PROSPECTS.find(function(x){return x.idx===idx;});if(!p)return'';
  var msg=document.getElementById('msg-area')?document.getElementById('msg-area').value:getMsg(idx);
  var tel=(p.telefone||'').replace(/[^0-9]/g,'');
  if(tel.length===9&&(tel[0]==='9'||tel[0]==='2'))tel='351'+tel;
  return'https://wa.me/'+tel+'?text='+encodeURIComponent(msg);
}

function openWA(){
  if(CUR===null)return;
  window.open(buildWaUrl(CUR),'_blank');
  if(getSt(CUR)==='Por contactar')setStatus(CUR,'DM enviado');
}

function copyMsg(){
  var msg=document.getElementById('msg-area')?document.getElementById('msg-area').value:getMsg(CUR);
  if(navigator.clipboard){navigator.clipboard.writeText(msg).then(function(){toast('Copiado!');});}
  else{var t=document.createElement('textarea');t.value=msg;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('Copiado!');}
}

function setStatus(idx,v){
  STATE[idx+'_st']=v;fbSet(idx+'_st',v);
  renderDetail(idx);renderList();toast('Estado actualizado');
}
function saveMsg(idx,v){STATE[idx+'_msg']=v;fbSet(idx+'_msg',v);}
function saveNote(idx,v){STATE[idx+'_note']=v;fbSet(idx+'_note',v);}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
